<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gold gradient for the ball -->
    <radialGradient id="goldBall" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    
    <!-- Gold gradient for cart and box -->
    <linearGradient id="goldLinear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    
    <!-- Ring gradient -->
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    
    <!-- Ribbon gradient -->
    <linearGradient id="ribbonGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DAA520"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
  </defs>
  
  <!-- Dark navy background -->
  <rect width="512" height="512" fill="#0a1628"/>
  
  <!-- Semi-circular gold ring at bottom -->
  <path d="M 80 380 A 176 176 0 0 1 432 380" 
        fill="none" 
        stroke="url(#goldRing)" 
        stroke-width="12" 
        stroke-linecap="round"/>
  
  <!-- METO FUN text on curved path -->
  <path id="textCurve" d="M 95 380 A 161 161 0 0 1 417 380" fill="none"/>
  <text fill="url(#goldLinear)" font-family="Arial Black, sans-serif" font-size="32" font-weight="bold">
    <textPath href="#textCurve" startOffset="50%" text-anchor="middle">METO FUN</textPath>
  </text>
  
  <!-- Golden sphere/ball -->
  <circle cx="256" cy="230" r="90" fill="url(#goldBall)"/>
  
  <!-- Shopping cart outline on top of ball -->
  <g transform="translate(256, 175)" stroke="url(#goldLinear)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cart basket -->
    <path d="M -40 -15 L -30 25 L 30 25 L 40 -15 Z"/>
    <!-- Cart wheels -->
    <circle cx="-22" cy="32" r="6"/>
    <circle cx="22" cy="32" r="6"/>
    <!-- Cart handle -->
    <path d="M -40 -15 L -50 -25 L -50 -35"/>
  </g>
  
  <!-- Gift box inside cart -->
  <g transform="translate(256, 185)">
    <!-- Box body -->
    <rect x="-22" y="-12" width="44" height="30" fill="url(#goldLinear)" rx="3"/>
    <!-- Ribbon vertical -->
    <rect x="-4" y="-12" width="8" height="30" fill="url(#ribbonGold)"/>
    <!-- Ribbon horizontal -->
    <rect x="-22" y="0" width="44" height="8" fill="url(#ribbonGold)"/>
    <!-- Bow on top -->
    <ellipse cx="-12" cy="-12" rx="10" ry="6" fill="url(#ribbonGold)"/>
    <ellipse cx="12" cy="-12" rx="10" ry="6" fill="url(#ribbonGold)"/>
    <circle cx="0" cy="-12" r="5" fill="url(#ribbonGold)"/>
    <!-- Number 17 on box -->
    <text x="0" y="10" text-anchor="middle" fill="#0a1628" font-family="Arial Black, sans-serif" font-size="18" font-weight="bold">17</text>
  </g>
  
  <!-- Subtle shine on ball -->
  <ellipse cx="225" cy="200" rx="25" ry="15" fill="rgba(255,255,255,0.3)" transform="rotate(-30 225 200)"/>
</svg>