<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="goldBall" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    <linearGradient id="goldLinear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>
  
  <!-- Dark navy background -->
  <rect width="192" height="192" fill="#0a1628" rx="24"/>
  
  <!-- Golden sphere -->
  <circle cx="96" cy="90" r="36" fill="url(#goldBall)"/>
  
  <!-- Shopping cart -->
  <g transform="translate(96, 72)" stroke="url(#goldLinear)" stroke-width="2" fill="none">
    <path d="M -16 -6 L -12 12 L 16 12 L 20 -6 Z"/>
    <circle cx="-10" cy="16" r="3"/>
    <circle cx="10" cy="16" r="3"/>
  </g>
  
  <!-- Gift box -->
  <g transform="translate(96, 76)">
    <rect x="-10" y="-6" width="20" height="14" fill="url(#goldLinear)" rx="2"/>
    <rect x="-2" y="-6" width="4" height="14" fill="#DAA520"/>
    <text x="0" y="5" text-anchor="middle" fill="#0a1628" font-family="Arial Black, sans-serif" font-size="9" font-weight="bold">17</text>
  </g>
  
  <!-- Ring -->
  <path d="M 30 145 A 66 66 0 0 1 162 145" fill="none" stroke="url(#goldLinear)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- METO FUN text -->
  <text x="96" y="158" text-anchor="middle" fill="url(#goldLinear)" font-family="Arial Black, sans-serif" font-size="14" font-weight="bold">METO FUN</text>
</svg>
