<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="goldBall" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    <radialGradient id="goldBallGlow" cx="35%" cy="35%" r="65%">
      <animate attributeName="stop-color" values="#FFF8DC;#FFFFFF;#FFF8DC" dur="2s" repeatCount="indefinite"/>
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    <linearGradient id="goldLinear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="goldLinearAnim" x1="0%" y1="0%" x2="100%" y2="100%">
      <animate attributeName="x1" values="0%;100%;0%" dur="3s" repeatCount="indefinite"/>
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark navy background -->
  <rect width="192" height="192" fill="#0a1628" rx="24"/>
  
  <!-- Animated glow ring behind -->
  <circle cx="96" cy="88" r="44" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.3">
    <animate attributeName="r" values="40;48;40" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Golden sphere with bounce -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="2s" repeatCount="indefinite"/>
    <circle cx="96" cy="90" r="36" fill="url(#goldBallGlow)"/>
  </g>
  
  <!-- Shopping cart with bounce -->
  <g transform="translate(96, 72)" stroke="url(#goldLinearAnim)" stroke-width="2" fill="none" filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" values="96,72; 96,69; 96,72" dur="2s" repeatCount="indefinite"/>
    <path d="M -16 -6 L -12 12 L 16 12 L 20 -6 Z"/>
    <circle cx="-10" cy="16" r="3">
      <animateTransform attributeName="transform" type="rotate" from="0 -10 16" to="360 -10 16" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="10" cy="16" r="3">
      <animateTransform attributeName="transform" type="rotate" from="0 10 16" to="360 10 16" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Gift box with bounce -->
  <g transform="translate(96, 76)" filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" values="96,76; 96,73; 96,76" dur="2s" repeatCount="indefinite"/>
    <rect x="-10" y="-6" width="20" height="14" fill="url(#goldLinearAnim)" rx="2"/>
    <rect x="-2" y="-6" width="4" height="14" fill="#DAA520">
      <animate attributeName="fill" values="#DAA520;#FFD700;#DAA520" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <text x="0" y="5" text-anchor="middle" fill="#0a1628" font-family="Arial Black, sans-serif" font-size="9" font-weight="bold">17</text>
  </g>
  
  <!-- Ring -->
  <path d="M 30 145 A 66 66 0 0 1 162 145" fill="none" stroke="url(#goldLinear)" stroke-width="4" stroke-linecap="round" filter="url(#glow)">
    <animate attributeName="stroke-width" values="4;5;4" dur="1.5s" repeatCount="indefinite"/>
  </path>
  
  <!-- ETO FUN text (M removed) -->
  <text x="96" y="158" text-anchor="middle" fill="url(#goldLinear)" font-family="Arial Black, sans-serif" font-size="14" font-weight="bold" filter="url(#glow)">
    ETO FUN
    <animate attributeName="fill" values="#FFD700;#FFEC8B;#FFD700" dur="2s" repeatCount="indefinite"/>
  </text>
  
  <!-- Sparkles -->
  <g fill="#FFD700">
    <circle cx="65" cy="55" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="125" cy="60" r="1.5">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="70" cy="110" r="1.5">
      <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="120" cy="115" r="1.5">
      <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
  </g>
</svg>
