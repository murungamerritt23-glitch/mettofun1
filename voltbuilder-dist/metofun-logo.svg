<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gold gradient for the ball -->
    <radialGradient id="goldBall" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    
    <!-- Animated gold gradient with pulse -->
    <radialGradient id="goldBallGlow" cx="35%" cy="35%" r="65%">
      <animate attributeName="stop-color" values="#FFF8DC;#FFFFFF;#FFF8DC" dur="2s" repeatCount="indefinite"/>
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="60%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    
    <!-- Gold gradient for cart and box -->
    <linearGradient id="goldLinear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    
    <!-- Animated gold gradient -->
    <linearGradient id="goldLinearAnim" x1="0%" y1="0%" x2="100%" y2="100%">
      <animate attributeName="x1" values="0%;100%;0%" dur="3s" repeatCount="indefinite"/>
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    
    <!-- Ring gradient -->
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    
    <!-- Ribbon gradient -->
    <linearGradient id="ribbonGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DAA520"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Strong glow filter -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark navy background -->
  <rect width="512" height="512" fill="#0a1628"/>
  
  <!-- Animated glow ring behind the ball -->
  <circle cx="256" cy="230" r="110" fill="none" stroke="#FFD700" stroke-width="3" opacity="0.3">
    <animate attributeName="r" values="100;120;100" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Semi-circular gold ring at bottom -->
  <path d="M 80 380 A 176 176 0 0 1 432 380" 
        fill="none" 
        stroke="url(#goldRing)" 
        stroke-width="12" 
        stroke-linecap="round"
        filter="url(#glow)">
    <animate attributeName="stroke-width" values="12;14;12" dur="1.5s" repeatCount="indefinite"/>
  </path>
  
  <!-- ETO FUN text on curved path (M removed) -->
  <path id="textCurve" d="M 95 380 A 161 161 0 0 1 417 380" fill="none"/>
  <text fill="url(#goldLinear)" font-family="Arial Black, sans-serif" font-size="32" font-weight="bold" filter="url(#glow)">
    <textPath href="#textCurve" startOffset="50%" text-anchor="middle">
      ETO FUN
      <animate attributeName="fill" values="#FFD700;#FFEC8B;#FFD700" dur="2s" repeatCount="indefinite"/>
    </textPath>
  </text>
  
  <!-- Golden sphere/ball with bounce animation -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="2s" repeatCount="indefinite"/>
    <circle cx="256" cy="230" r="90" fill="url(#goldBallGlow)"/>
  </g>
  
  <!-- Shopping cart outline on top of ball with bounce -->
  <g transform="translate(256, 175)" stroke="url(#goldLinearAnim)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" values="256,175; 256,167; 256,175" dur="2s" repeatCount="indefinite"/>
    <!-- Cart basket -->
    <path d="M -40 -15 L -30 25 L 30 25 L 40 -15 Z"/>
    <!-- Cart wheels -->
    <circle cx="-22" cy="32" r="6">
      <animateTransform attributeName="transform" type="rotate" from="0 -22 32" to="360 -22 32" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="22" cy="32" r="6">
      <animateTransform attributeName="transform" type="rotate" from="0 22 32" to="360 22 32" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Cart handle -->
    <path d="M -40 -15 L -50 -25 L -50 -35"/>
  </g>
  
  <!-- Gift box inside cart with bounce -->
  <g transform="translate(256, 185)" filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" values="256,185; 256,177; 256,185" dur="2s" repeatCount="indefinite"/>
    <!-- Box body -->
    <rect x="-22" y="-12" width="44" height="30" fill="url(#goldLinearAnim)" rx="3"/>
    <!-- Ribbon vertical -->
    <rect x="-4" y="-12" width="8" height="30" fill="url(#ribbonGold)"/>
    <!-- Ribbon horizontal -->
    <rect x="-22" y="0" width="44" height="8" fill="url(#ribbonGold)"/>
    <!-- Bow on top -->
    <ellipse cx="-12" cy="-12" rx="10" ry="6" fill="url(#ribbonGold)">
      <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="1s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="12" cy="-12" rx="10" ry="6" fill="url(#ribbonGold)">
      <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="1s" repeatCount="indefinite"/>
    </ellipse>
    <circle cx="0" cy="-12" r="5" fill="url(#ribbonGold)">
      <animate attributeName="r" values="5;6;5" dur="1s" repeatCount="indefinite"/>
    </circle>
    <!-- Number 17 on box -->
    <text x="0" y="10" text-anchor="middle" fill="#0a1628" font-family="Arial Black, sans-serif" font-size="18" font-weight="bold">17</text>
  </g>
  
  <!-- Subtle shine on ball - animated -->
  <ellipse cx="225" cy="200" rx="25" ry="15" fill="rgba(255,255,255,0.3)" transform="rotate(-30 225 200)">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="25;30;25" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Sparkle effects -->
  <g fill="#FFD700" filter="url(#strongGlow)">
    <circle cx="180" cy="150" r="3">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="0;4;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="330" cy="160" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="r" values="0;3;0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="200" cy="280" r="2.5">
      <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="r" values="0;3.5;0" dur="1.8s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="310" cy="290" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite" begin="0.7s"/>
      <animate attributeName="r" values="0;3;0" dur="2.2s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
  </g>
</svg>